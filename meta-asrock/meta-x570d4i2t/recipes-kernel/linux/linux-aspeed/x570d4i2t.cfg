# AMD APML / SB-RMI driver — the X570D4I-2T exposes the host CPU's SB-RMI
# interface on i2c1 alongside the W83773G (confirmed against the stock AMI
# firmware's IPMI.conf which sets APML_BUS_NUMBER=1). This lets the BMC
# read CPU thermal and power-management telemetry directly over SMBus.
#
# (CONFIG_SENSORS_W83773G is already enabled in the upstream
# meta-aspeed/.../aspeed-g5/defconfig — no override needed here.
# CONFIG_SENSORS_SBTSI is intentionally NOT enabled: SB-TSI lives at
# i2c1:0x4c, the same address as the W83773G chip on this board.)
CONFIG_SENSORS_SBRMI=m
