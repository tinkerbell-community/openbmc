# Hardware monitor — the X570D4I-2T uses a Nuvoton W83773G temperature
# sensor on i2c1 (verified by comparing the upstream X570D4U DTS, which
# is the closest sibling and uses the same sensor IC).
CONFIG_SENSORS_W83773G=y

# AMD APML / SB-RMI driver — the X570D4I-2T exposes the host CPU's SB-RMI
# and SB-TSI interfaces on i2c1 (confirmed against the stock AMI firmware's
# IPMI.conf which sets APML_BUS_NUMBER=1). This gives the BMC direct read
# access to CPU temperature and power-management telemetry over SMBus.
CONFIG_SENSORS_SBRMI=m
CONFIG_SENSORS_SBTSI=m
